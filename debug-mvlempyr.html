<script async="" data-cfasync="false">
/* MVL - HEAD (FOUC-safe theme + css vars) */
(function () {
  "use strict";

  const COLOR_FIELDS = {
    textcolor:    { cssVar: "--text",       storage: "uiTextColor" },
    bodycolor:    { cssVar: "--body",       storage: "uiBodyColor" },
    bgcolor:      { cssVar: "--background", storage: "uiBackgroundColor" },
    accentcolor1: { cssVar: "--border",     storage: "uiBorderColor" },
    accentcolor2: { cssVar: "--highlights", storage: "uiHighlightColor" }
  };

  const OTHER_CSS_PROPS_CONFIG = {
    "border-radius":   { cssVar: "--b-radius",     storage: "uiBorderRadius",   defaultValue: "10px", unit: "px" },
    "search-accuracy": { cssVar: "--fuzzy-search", storage: "uiSearchAccuracy", defaultValue: "80",   unit: "",   min: 0, max: 100 }
  };

  const FONT_SETTINGS_INIT = {
    cssVar: "--d-font",
    storageKey: "uiGlobalFont",
    initialCssDefault: '"Josefin Sans", sans-serif',
    options: [
      "Default","Nunito Sans","Merriweather","Arial","Verdana","Roboto",
      "Times New Roman","Courier New","Georgia","Palatino","Garamond","Open Sans",
      "Comic Sans MS","Trebuchet MS","Arial Black","Impact","Tahoma","Segoe UI",
      "Pacifico","Lobster","Dancing Script","Montserrat","Lato"
    ],
    getFontCss(font) {
      if (font === "Default" || !font) return this.initialCssDefault;
      if (!this.options.includes(font)) return this.initialCssDefault;

      let fallback = "sans-serif";
      if (["Merriweather","Times New Roman","Georgia","Palatino","Garamond"].includes(font)) fallback = "serif";
      else if (["Courier New"].includes(font)) fallback = "monospace";
      else if (["Pacifico","Lobster","Dancing Script"].includes(font)) fallback = "cursive";

      return `"${font}", ${fallback}`;
    }
  };

  function applyTheme(isLight) {
    const s = document.documentElement.style;
    if (isLight) {
      s.setProperty("--body", "#ffffff");
      s.setProperty("--text", "#000000");
      s.setProperty("--background", "#e5e1ff");
      s.setProperty("--search", "#e5e1ff");
      s.setProperty("--black", "#ffffff");
    } else {
      s.setProperty("--body", "#16151d");
      s.setProperty("--text", "#ffffff");
      s.setProperty("--background", "#181629");
      s.setProperty("--search", "#1f2937");
      s.setProperty("--black", "#000000");
    }
  }

  function applySavedCustomColors() {
    const s = document.documentElement.style;
    for (const { cssVar, storage } of Object.values(COLOR_FIELDS)) {
      const v = localStorage.getItem(storage);
      if (v) s.setProperty(cssVar, v);
    }
  }

  function applySavedCustomCssProps() {
    const s = document.documentElement.style;
    for (const cfg of Object.values(OTHER_CSS_PROPS_CONFIG)) {
      let v = cfg.defaultValue;
      let stored = localStorage.getItem(cfg.storage);
      let wroteBack = false;

      if (stored) {
        const ok =
          typeof stored === "string" &&
          (!cfg.unit || cfg.unit === "" || stored.endsWith(cfg.unit)) &&
          !isNaN(parseInt(stored, 10));

        if (ok) {
          let n = parseInt(stored, 10);
          if (typeof cfg.min === "number" && n < cfg.min) { n = cfg.min; wroteBack = true; }
          if (typeof cfg.max === "number" && n > cfg.max) { n = cfg.max; wroteBack = true; }
          v = cfg.unit ? (n + cfg.unit) : String(n);
        } else {
          localStorage.removeItem(cfg.storage);
        }
      }

      s.setProperty(cfg.cssVar, v);
      if (wroteBack) localStorage.setItem(cfg.storage, v);
    }
  }

  function applySavedFont() {
    const s = document.documentElement.style;
    const f = localStorage.getItem(FONT_SETTINGS_INIT.storageKey);
    if (f && FONT_SETTINGS_INIT.options.includes(f)) s.setProperty(FONT_SETTINGS_INIT.cssVar, FONT_SETTINGS_INIT.getFontCss(f));
    else if (f) localStorage.removeItem(FONT_SETTINGS_INIT.storageKey);
  }

  function applyR18Filter(enabled) {
    document.documentElement.style.setProperty("--display", enabled ? "flex" : "none");
  }

  // Run immediately (prevents flash)
  const isLight = localStorage.getItem("switch6State") === "checked";
  const r18On   = localStorage.getItem("R18Filter") === "checked";

  applyTheme(isLight);
  applySavedCustomColors();
  applySavedCustomCssProps();
  applySavedFont();
  applyR18Filter(r18On);

  // Export (used by before-body)
  window.MVL_UI_CONFIG = { COLOR_FIELDS, OTHER_CSS_PROPS_CONFIG, FONT_SETTINGS_INIT };
  window.applyTheme = applyTheme;
  window.applySavedCustomColors = applySavedCustomColors;
  window.applySavedCustomCssProps = applySavedCustomCssProps;
  window.applyR18Filter = applyR18Filter;
})();
</script>

<script>
/* MVL - BEFORE BODY (optimized bindings + IndexedDB full-cache + lazy Fuse + wp sync + comments) */
(function () {

    getFontCss(font){

      if(!this.options.includes(font)) return this.initialCssDefault;
      let fb="sans-serif";
      if(["Merriweather","Times New Roman","Georgia","Palatino","Garamond"].includes(font)) fb="serif";
      else if(["Courier New"].includes(font)) fb="monospace";
      else if(["Pacifico","Lobster","Dancing Script"].includes(font)) fb="cursive";
      return `"${font}", ${fb}`;
    }
  };

  const idle = (fn, timeout=1800) => {
    const run = () => { try { fn(); } catch (e) { console.error("[MVL]", e); } };
    if ("requestIdleCallback" in window) requestIdleCallback(run, { timeout });
    else setTimeout(run, 0);

  const rafDebounce = (fn) => {
    let raf = 0;
    return (...args) => {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => fn(...args));
    };
  };
  const debounce = (fn, ms=200) => {
    let t=0;
    return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); };
  };
  const safeJSON = (k, fallback) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fallback; } catch { return fallback; } };
  const clamp = (n, min, max) => Math.min(max, Math.max(min, n));

  const rgbToHex = (v) => {
    if (!v) return "#000000";
    v = String(v).trim();
    if (v.startsWith("#")) return v;
    const m = v.match(/\d+/g);
    if (!m || m.length < 3) return "#000000";
    return "#" + m.slice(0,3).map(x => (+x).toString(16).padStart(2,"0")).join("");
  };

  const dispatchAccuracyChange = (accuracy) => {
    window.dispatchEvent(new CustomEvent("mvlFuzzyAccuracyChanged", { detail: { accuracy } }));
  };

  document.addEventListener("DOMContentLoaded", () => {
    initUiPanel();
    initSearchDropdownVisibility();
    initMobileNav();
    initHeaderHideOnScroll();

    initComentarioOptimized();
    idle(initGlinkHostRewrite, 1800);

  // ---------------------------------------
  // UI PANEL (theme toggle + color pickers + sliders + font)
  // ---------------------------------------
  function initUiPanel() {
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.checked = (localStorage.getItem("switch6State") === "checked");
      themeToggle.addEventListener("change", () => {
        localStorage.setItem("switch6State", themeToggle.checked ? "checked" : "unchecked");
        window.applyTheme?.(themeToggle.checked);
        window.applySavedCustomColors?.();
        refreshUiFromComputed();
      }, { passive: true });
    }

    const r18 = document.getElementById("r18-filter-switch");
    if (r18) {
      r18.checked = (localStorage.getItem("R18Filter") === "checked");

        localStorage.setItem("R18Filter", r18.checked ? "checked" : "unchecked");

    }

    // Colors
    for (const [id, cfg] of Object.entries(COLOR_FIELDS)) {
      const input = document.getElementById(id);
      if (!input) continue;

      const preview = input.closest(".color-picker")?.querySelector(".color-preview") || input.nextElementSibling;

      input.addEventListener("input", () => {
        const val = input.value;
        document.documentElement.style.setProperty(cfg.cssVar, val);
        localStorage.setItem(cfg.storage, val);
        if (preview) preview.style.background = val;
      }, { passive: true });
    }

    // Other css props (border-radius + search-accuracy)
    for (const [id, cfg] of Object.entries(OTHER_CSS_PROPS_CONFIG)) {
      const input = document.getElementById(id);
      if (!input) continue;

      const computedRaw = getComputedStyle(document.documentElement).getPropertyValue(cfg.cssVar).trim();
      let n = parseInt(computedRaw, 10);
      if (isNaN(n)) n = parseInt(cfg.defaultValue, 10);

      input.value = n;

      input.addEventListener("input", () => {
        const raw = String(input.value || "").trim();
        if (!raw) {
          document.documentElement.style.setProperty(cfg.cssVar, cfg.defaultValue);
          localStorage.removeItem(cfg.storage);
          input.value = parseInt(cfg.defaultValue, 10);
          if (id === "search-accuracy") dispatchAccuracyChange(parseInt(input.value, 10));
          return;
        }

        let v = parseInt(raw, 10);
        if (isNaN(v)) {
          let cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue(cfg.cssVar).trim(), 10);
          if (isNaN(cur)) cur = parseInt(cfg.defaultValue, 10);
          input.value = cur;
          if (id === "search-accuracy") dispatchAccuracyChange(cur);
          return;
        }

        if (typeof cfg.min === "number") v = Math.max(cfg.min, v);
        if (typeof cfg.max === "number") v = Math.min(cfg.max, v);

        if (String(v) !== raw) input.value = v;

        const cssVal = cfg.unit ? (v + cfg.unit) : String(v);
        document.documentElement.style.setProperty(cfg.cssVar, cssVal);
        localStorage.setItem(cfg.storage, cssVal);

        if (id === "search-accuracy") dispatchAccuracyChange(v);

    if (fontSelect) {
      if (!fontSelect.__mvlPopulated) {

      }

      let stored = localStorage.getItem(FONT_SETTINGS_INIT.storageKey);
      if (!stored || !FONT_SETTINGS_INIT.options.includes(stored)) stored = "Default";

      document.documentElement.style.setProperty(FONT_SETTINGS_INIT.cssVar, FONT_SETTINGS_INIT.getFontCss(stored));

      fontSelect.addEventListener("change", () => {
        const v = fontSelect.value;
        document.documentElement.style.setProperty(FONT_SETTINGS_INIT.cssVar, FONT_SETTINGS_INIT.getFontCss(v));
        localStorage.setItem(FONT_SETTINGS_INIT.storageKey, v);
      }, { passive: true });

    const resetBtn = document.querySelector(".reset-colors");
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        for (const { storage, cssVar } of Object.values(COLOR_FIELDS)) {
          localStorage.removeItem(storage);
          document.documentElement.style.removeProperty(cssVar);

        const themeToggle = document.getElementById("themeToggle");
        window.applyTheme?.(themeToggle ? themeToggle.checked : (localStorage.getItem("switch6State")==="checked"));

        for (const cfg of Object.values(OTHER_CSS_PROPS_CONFIG)) {
          localStorage.removeItem(cfg.storage);
          document.documentElement.style.setProperty(cfg.cssVar, cfg.defaultValue);
          if (cfg.storage === "uiSearchAccuracy") dispatchAccuracyChange(parseInt(cfg.defaultValue,10));
        }

        localStorage.removeItem(FONT_SETTINGS_INIT.storageKey);
        document.documentElement.style.setProperty(FONT_SETTINGS_INIT.cssVar, FONT_SETTINGS_INIT.initialCssDefault);
        if (fontSelect) fontSelect.value = "Default";

        refreshUiFromComputed();
      });
    }

    function refreshUiFromComputed() {
      const cs = getComputedStyle(document.documentElement);
      for (const [id, cfg] of Object.entries(COLOR_FIELDS)) {
        const input = document.getElementById(id);
        if (!input) continue;
        const preview = input.closest(".color-picker")?.querySelector(".color-preview") || input.nextElementSibling;
        const v = rgbToHex(cs.getPropertyValue(cfg.cssVar).trim());
        input.value = v;
        input.setAttribute("value", v);
        if (preview) preview.style.background = v;
      }
      for (const [id, cfg] of Object.entries(OTHER_CSS_PROPS_CONFIG)) {
        const input = document.getElementById(id);
        if (!input) continue;
        let v = parseInt(cs.getPropertyValue(cfg.cssVar).trim(), 10);
        if (isNaN(v)) v = parseInt(cfg.defaultValue, 10);
        input.value = v;
      }
    }
  }

  // ---------------------------------------
  // AUTH FORMS (Webflow password-field workaround)
  // - Prevent Webflow submit flow (it blocks password fields)
  // - Convert submit -> button, intercept Enter, call mvlLogin/mvlSignup
  // ---------------------------------------
  function initAuthForms_WebflowPasswordWorkaround() {
    const guessAuthType = (form) => {
      const v = (form.getAttribute("data-mvl-auth") || "").toLowerCase();
      if (v === "login" || v === "signup") return v;
  
      const hasEmail = !!form.querySelector(
        'input[type="email"], input[name="email" i], input[id*="email" i], input[autocomplete="email" i]'
      );
  
      const hasUser = !!form.querySelector(
        'input[name="username" i], input[autocomplete="username" i], input[id*="user" i], input[name="login" i], input[id*="login" i]'
      );
  
      // If it has BOTH username + email, it's probably signup
      if (hasEmail && hasUser) return "signup";
      return "login";
    };
  
    const isLikelyAuthForm = (form) => {
      const hasPw = !!form.querySelector(
        'input[type="password"], input[name="password" i], input[id*="pass" i], input[autocomplete*="password" i]'
      );
      if (!hasPw) return false;
  
      const hint = (
        (form.id || "") + " " +
        (form.className || "") + " " +
        (form.getAttribute("data-name") || "")
      ).toLowerCase();
  
      if (/(login|signin|sign-in|signup|sign-up|register|auth)/.test(hint)) return true;
  
      // fallback: password + (username OR email)
      const hasIdentity = !!form.querySelector(
        'input[type="email"], input[name="email" i], input[autocomplete="email" i], input[name="username" i], input[autocomplete="username" i]'
      );
      return hasIdentity;
    };
  
    const forms = Array.from(document.querySelectorAll("form")).filter(isLikelyAuthForm);
    if (!forms.length) return;
  
    const getField = (form, selectors) => {
      for (const s of selectors) {
        const el = form.querySelector(s);
        if (el) return el;
      }
      return null;
    };
  
    const bind = (form) => {
      if (form.__mvlAuthBound) return;
      form.__mvlAuthBound = true;
  
      const usernameEl = getField(form, [
        'input[name="username" i]',
        'input[autocomplete="username" i]',
        'input[id*="user" i]',
        'input[name="login" i]',
        'input[id*="login" i]'
      ]);
  
      const emailEl = getField(form, [
        'input[type="email"]',
        'input[name="email" i]',
        'input[autocomplete="email" i]',
        'input[id*="email" i]'
      ]);
  
      const passEl = getField(form, [
        'input[type="password"]',
        'input[name="password" i]',
        'input[id*="pass" i]',
        'input[autocomplete*="password" i]'
      ]);
  
      if (!passEl) return;
  
      // Helpful autofill hints (harmless)
      if (usernameEl && !usernameEl.autocomplete) usernameEl.autocomplete = "username";
      if (emailEl && !emailEl.autocomplete) emailEl.autocomplete = "email";
      if (!passEl.autocomplete) passEl.autocomplete = "current-password";
  
      // Convert submit buttons -> normal buttons so Webflow never "submits" the form
      const submits = Array.from(form.querySelectorAll('button[type="submit"], input[type="submit"]'));
      submits.forEach((b) => { try { b.setAttribute("type", "button"); } catch {} });
  
      let busy = false;
  
      const run = async () => {
        if (busy) return;
  
        if (typeof window.mvlLogin !== "function" || typeof window.mvlSignup !== "function") {
          console.warn("[MVL AUTH] mvlLogin/mvlSignup not ready yet.");
          return;
        }
  
        const type = guessAuthType(form);
        const username = (usernameEl?.value || "").trim();
        const email = (emailEl?.value || "").trim();
        const password = (passEl?.value || "").trim();
  
        if (type === "signup") {
          if (!username || !email || !password) {
            alert("Please fill username, email, and password.");
            return;
          }
        } else {
          const ident = username || email;
          if (!ident || !password) {
            alert("Please fill username/email and password.");
            return;
          }
        }
  
        busy = true;
        submits.forEach((b) => (b.disabled = true));
  
        try {
          if (type === "signup") await window.mvlSignup(username, email, password);
          else await window.mvlLogin(username || email, password);
        } finally {
          busy = false;
          submits.forEach((b) => (b.disabled = false));
        }
      };
  
      // Click on old submit buttons now triggers JS auth
      submits.forEach((b) => b.addEventListener("click", (e) => { e.preventDefault(); run(); }));
  
      // Block submit (and Webflow handler), even if user hits Enter
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        e.stopImmediatePropagation();
        run();
      }, true);
  
      // Enter key triggers login/signup without submitting
      [usernameEl, emailEl, passEl].filter(Boolean).forEach((el) => {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            e.stopPropagation();
            run();
          }
        });
      });
    };
  
    forms.forEach(bind);
  }

  // ---------------------------------------
  // Mobile nav (same behavior, less work)
  // ---------------------------------------
  function initMobileNav() {
    const btnOpen = document.querySelector(".mobilenavtoggleopen");
    const btnClose = document.querySelector(".mobilenavtoggleclose");
    const overlay = document.querySelector(".mobilenavoverlay");
    const content = document.querySelector(".mobilenavcontent");
    if (!btnOpen || !btnClose || !overlay || !content) return;

    const body = document.body;

    const open = () => {
      body.classList.add("no-scroll");
      overlay.style.display = "flex";
      overlay.offsetWidth;
      overlay.classList.add("active");
      content.classList.add("show");
    };

    const close = () => {
      body.classList.remove("no-scroll");
      content.classList.remove("show");
      overlay.classList.remove("active");
      overlay.addEventListener("transitionend", function te(ev) {
        if (ev.target === overlay && !overlay.classList.contains("active")) {
          overlay.style.display = "none";
          overlay.removeEventListener("transitionend", te);
        }
      }, { once: true });
    };

    btnOpen.addEventListener("click", open);
    btnClose.addEventListener("click", close);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  }

  // ---------------------------------------
  // Header hide on scroll (rAF throttled)
  // ---------------------------------------
  function initHeaderHideOnScroll() {
    const header = document.querySelector(".headersection");
    if (!header) return;
    let lastY = window.pageYOffset || 0;
    let ticking = false;

    function onScroll() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const y = window.pageYOffset || document.documentElement.scrollTop || 0;
        const offset = 0.1 * window.innerHeight;
        header.style.transform = (y > lastY && y > offset) ? "translateY(-65px)" : "translateY(0)";
        lastY = Math.max(y, 0);
        ticking = false;
      });
    }

    window.addEventListener("scroll", onScroll, { passive: true });
  }

  // ---------------------------------------
  // FUZZY SEARCH (BIG WIN): IndexedDB full dataset cache + stale-while-revalidate
  // Preserves ALL FIELDS as returned by API.
  // ---------------------------------------
  function initFuzzySearchOptimized_IDB_FULLDATA() {
    if (window.fuzzySearchScriptHasRun) return;
    window.fuzzySearchScriptHasRun = true;

    const API = "https://chap.heliosarchive.online/wp-json/wp/v2/mvl-novels";

    // Cache policy
    const FRESH_TTL_MS   = 14 * 24 * 60 * 60 * 1000; // "fresh enough" = 14 days
    const MAX_STALE_MS   = 60 * 24 * 60 * 60 * 1000; // allow stale up to 60 days to keep site instant
    const BG_REFRESH_IF_OLDER_THAN_MS = 6 * 60 * 60 * 1000; // refresh in bg if older than 6 hours

    // IndexedDB
    const DB_NAME = "mvl_cache_db_v1";
    const STORE   = "kv";
    const KEY_CATALOGUE = "novel_catalogue_full";

    // Public hook for other scripts (optional): await window.__mvlNovelsReady
    let resolveNovelsReady;
    window.__mvlNovelsReady = new Promise((res) => (resolveNovelsReady = res));

    let novels = [];
    let fuse = null;
    let fuseBuilding = false;

    // IMPORTANT: match your actual fields (supports both hyphen and underscore)
    const fuseOptions = {
      keys: [
        { name: "name", weight: 0.75 },
        { name: "author-name", weight: 0.55 },
        { name: "associated-names", weight: 0.35 },
        // fallback older field names (harmless if missing)
        { name: "author_name", weight: 0.55 },
        { name: "associated_names", weight: 0.35 }
      ],
      includeScore: false,
      threshold: 0.20,
      minMatchCharLength: 2,
      ignoreLocation: true
    };

    function currentAccuracy() {
      const raw = getComputedStyle(document.documentElement).getPropertyValue("--fuzzy-search").trim();
      let acc = 80;
      if (raw) {
        const n = parseFloat(raw);
        if (!isNaN(n) && n >= 0 && n <= 100) acc = n;
      }
      return acc;
    }

    function setThresholdFromAccuracy(acc) {
      const thr = clamp((100 - acc) / 100, 0, 1);
      if (Math.abs(fuseOptions.threshold - thr) < 0.001) return;
      fuseOptions.threshold = thr;

      // If Fuse already exists, rebuild lazily (don’t block input)
      if (fuse && novels.length && window.Fuse) {
        idle(() => { fuse = new Fuse(novels, fuseOptions); }, 1200);
      }
    }

    // NO polling: accuracy updates come from slider + storage event
    window.addEventListener("mvlFuzzyAccuracyChanged", (e) => {
      const acc = e?.detail?.accuracy;
      if (typeof acc === "number") setThresholdFromAccuracy(acc);
    });
    window.addEventListener("storage", (e) => {
      if (e.key === "uiSearchAccuracy") setThresholdFromAccuracy(currentAccuracy());
    });

    function normalizeText(n) {
      const name = (n?.name || "");
      const author = (n?.["author-name"] || n?.author_name || "");
      const assoc  = (n?.["associated-names"] || n?.associated_names || "");
      return `${name} ${author} ${assoc}`.toLowerCase();
    }

    function ensureFuseAsync() {
      if (fuse || fuseBuilding) return;
      if (!window.Fuse || !novels.length) return;

      fuseBuilding = true;
      idle(() => {
        try { fuse = new Fuse(novels, fuseOptions); }
        catch (e) { console.warn("[FuzzySearch] Fuse init failed:", e); }
        finally { fuseBuilding = false; }
      }, 1200);
    }

    function search(q) {
      if (!q) return [];
      // Kick off fuse build lazily
      ensureFuseAsync();

      if (fuse) return fuse.search(q).map(r => r.item);

      // Fast fallback until Fuse is ready
      const parts = q.toLowerCase().split(/\s+/).filter(Boolean);
      if (!parts.length) return [];
      return novels.filter((n) => {
        const hay = normalizeText(n);
        return parts.every(p => hay.includes(p));
      });
    }

    function setCatalogue(list, meta) {
      novels = Array.isArray(list) ? list : [];

      // Preserve ALL fields exactly as API returned (no transforms)
      window.__mvlNovels = novels;

      // Event for your other scripts
      window.dispatchEvent(new Event("mvlNovelsReady"));

      // Promise for scripts that prefer await
      resolveNovelsReady?.(novels);

      // Apply threshold from CSS immediately
      setThresholdFromAccuracy(currentAccuracy());

      // Build Fuse later (idle) so first paint stays instant
      ensureFuseAsync();

      if (meta?.source) {
        // Optional debug:
        // console.log(`[FuzzySearch] Catalogue ready: ${novels.length} novels (source=${meta.source})`);
      }
    }

    // ---------------------------
    // UI wiring (same behavior)
    // ---------------------------
    document.querySelectorAll(".headsearchwrapper").forEach((wrap) => {
      const input = wrap.querySelector(".searchtextblock");
      const listHost = wrap.querySelector(".searchnovelwrapper .novelheadsearch");
      const none = wrap.querySelector(".nonovelsfound");
      if (!input || !listHost) return;

      const isMob = !!wrap.closest(".mobilenavcontent, #search-form-mobile");
      const perInputDebounce = debounce(() => {
        const q = input.value.trim();
        if (!q) {
          listHost.textContent = "";
          if (none) none.style.display = "none";
          return;
        }
        const items = search(q).slice(0, 30);
        renderResults(items);
      }, 180);

      input.addEventListener("input", perInputDebounce, { passive: true });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const q = input.value.trim();
          if (q) window.location.href = `/advanced-search?q=${encodeURIComponent(q)}`;
        }
      });

      function renderResults(items) {
        listHost.textContent = "";
        if (!items.length) {
          if (none) none.style.display = "block";
          return;
        }
        if (none) none.style.display = "none";

        const frag = document.createDocumentFragment();
        items.forEach((n) => {
          const slug = n?.slug || "#";
          const title = n?.name || "Untitled";

          const row = document.createElement("div");
          const a = document.createElement("a");
          const name = document.createElement("div");

          row.className = "searchitem";
          a.className = "novellinksearch w-inline-block";
          if (isMob) { row.classList.add("mob"); a.classList.add("mob"); }

          a.href = `/novel/${slug}`;
          name.className = "novelsearchname";
          name.textContent = title;

          a.appendChild(name);
          row.appendChild(a);
          frag.appendChild(row);
        });

        listHost.appendChild(frag);
      }
    });

    // ---------------------------
    // IndexedDB helpers
    // ---------------------------
    function idbOpen() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) return reject(new Error("IndexedDB not supported"));
        const req = indexedDB.open(DB_NAME, 1);
        req.onerror = () => reject(req.error);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
        };
        req.onsuccess = () => resolve(req.result);
      });
    }

    async function idbGet(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const st = tx.objectStore(STORE);
        const rq = st.get(key);
        rq.onerror = () => reject(rq.error);
        rq.onsuccess = () => resolve(rq.result || null);
      });
    }

    async function idbSet(key, value) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        const st = tx.objectStore(STORE);
        const rq = st.put(value, key);
        rq.onerror = () => reject(rq.error);
        rq.onsuccess = () => resolve(true);
      });
    }

    // ---------------------------
    // Load-from-cache instantly, then revalidate
    // ---------------------------
    (async () => {
      let cached = null;
      try { cached = await idbGet(KEY_CATALOGUE); } catch (e) { /* ignore */ }

      const now = Date.now();
      const cachedTs = cached?.ts ? Number(cached.ts) : 0;
      const age = cachedTs ? (now - cachedTs) : Infinity;

      if (cached && Array.isArray(cached.data) && cached.data.length) {
        // Use cache immediately even if stale (up to MAX_STALE)
        if (age <= MAX_STALE_MS) setCatalogue(cached.data, { source: age <= FRESH_TTL_MS ? "idb_fresh" : "idb_stale" });

        // Background refresh if older than threshold
        if (age > BG_REFRESH_IF_OLDER_THAN_MS) {
          idle(() => fetchAndUpdateCatalogue(true), 2000);
        }
      } else {
        // No cache => fetch after idle so page paints instantly
        idle(() => fetchAndUpdateCatalogue(false), 1800);
      }
    })();

    async function fetchAndUpdateCatalogue(isBackground) {
      try {
        const meta = await fetch(`${API}?per_page=1`, { cache: "no-store" });
        if (!meta.ok) throw new Error(`Meta fetch HTTP ${meta.status}`);

        const total = parseInt(meta.headers.get("X-WP-Total") || "0", 10);
        if (!Number.isFinite(total) || total <= 0) throw new Error("Invalid X-WP-Total");

        const perPage = 1000;
        const pages = Math.ceil(total / perPage);
        const urls = Array.from({ length: pages }, (_, i) => `${API}?per_page=${perPage}&page=${i+1}`);

        // Keep concurrency modest (avoids flooding + keeps UI snappy)
        const concurrency = 4;
        const out = new Array(urls.length);
        let idx = 0;

        async function worker() {
          while (idx < urls.length) {
            const my = idx++;
            const r = await fetch(urls[my], { cache: "no-store" });
            if (!r.ok) throw new Error(`Page ${my+1} HTTP ${r.status}`);
            out[my] = await r.json();
          }
        }

        await Promise.all(Array.from({ length: Math.min(concurrency, urls.length) }, worker));

        const list = out.flat().filter(Boolean);
        if (!Array.isArray(list) || !list.length) throw new Error("Empty catalogue response");

        // Use immediately
        setCatalogue(list, { source: "network" });

        // Persist full data (all fields) to IndexedDB
        try {
          await idbSet(KEY_CATALOGUE, { ts: Date.now(), data: list });
        } catch (e) {
          // Quota can happen on very large payloads; still keep runtime working.
          // console.warn("[FuzzySearch] IndexedDB cache write failed:", e);
        }
      } catch (e) {
        console.warn("[FuzzySearch] Catalogue fetch failed:", e);

        // Fallback: attempt bigger single shot (may or may not work depending on server cap)
        try {
          const r = await fetch(`${API}?per_page=20000`, { cache: "no-store" });
          if (!r.ok) throw new Error(`Fallback HTTP ${r.status}`);
          const list = await r.json();
          if (Array.isArray(list) && list.length) {
            setCatalogue(list, { source: "fallback_network" });
            try { await idbSet(KEY_CATALOGUE, { ts: Date.now(), data: list }); } catch {}
            return;
          }
          throw new Error("Fallback returned empty list");
        } catch (e2) {
          console.error("[FuzzySearch] Fallback catalogue fetch failed:", e2);
          if (!isBackground && !window.__mvlNovels) setCatalogue([], { source: "failed" });
        }
      }
    }
  }

  // ---------------------------------------
  // WP LocalStorage Sync (deferred)
  // ---------------------------------------
  function initWpLocalStorageSync() {
    const WP_BASE = "https://chap.heliosarchive.online/wp-json";
    const TOKEN   = "mvl_jwt";
    const SNAP_KEY = "_sync_snapshot_ts";
    const USER_DISPLAY_NAME_KEY = "mvl_user_display_name";
    const PUSH_DEBOUNCE_MS = 1000;
    const PULL_INTERVAL_MS = 15000;
    const PUSH_TIMEOUT_MS = 20000;
    const KEEPALIVE_LIMIT = 60000;

    let LS_OK = true;
    try { localStorage.setItem("__mvl_test","1"); localStorage.removeItem("__mvl_test"); } catch { LS_OK = false; }

    const memStore = {};
    const ls = {
      get: (k) => LS_OK ? localStorage.getItem(k) : (memStore[k] ?? null),
      set: (k, v) => { try { if (LS_OK) localStorage.setItem(k, v); else throw 1; } catch { LS_OK = false; memStore[k]=v; } },
      del: (k) => { try { if (LS_OK) localStorage.removeItem(k); else throw 1; } catch { LS_OK = false; delete memStore[k]; } },
      keys: () => LS_OK ? Object.keys(localStorage) : Object.keys(memStore),
      clear: () => { try { if (LS_OK) localStorage.clear(); else throw 1; } catch { LS_OK = false; for (const k in memStore) delete memStore[k]; } }
    };

    let pushDebounceTimer = null;
    let pushQueue = Promise.resolve();
    let pendingPush = false;

    async function wp(path, { keepalive=false, timeout=PUSH_TIMEOUT_MS, ...opt } = {}) {
      opt.headers ??= {};
      const tok = ls.get(TOKEN);
      if (tok) opt.headers.Authorization = `Bearer ${tok}`;
      if (!opt.headers["Content-Type"]) opt.headers["Content-Type"] = "application/json";
      if (keepalive) opt.keepalive = true;

      const ac = new AbortController();
      const timer = setTimeout(() => ac.abort("timeout"), timeout);
      opt.signal = ac.signal;

      const res = await fetch(`${WP_BASE}${path}`, opt).finally(() => clearTimeout(timer));
      const txt = await res.text();

      if (!res.ok) {
        try { throw JSON.parse(txt); }
        catch { throw { code:`http_error_${res.status}`, message: txt || `HTTP ${res.status}`, status: res.status }; }
      }
      return txt ? JSON.parse(txt) : {};
    }

    function makeSnapshot() {
      const blob = {};
      for (const k of ls.keys()) {
        if (k === TOKEN || k === SNAP_KEY || k === USER_DISPLAY_NAME_KEY) continue;
        blob[k] = ls.get(k);
      }
      return blob;
    }

    function schedulePush() {
      if (pendingPush) return;
      pendingPush = true;
      clearTimeout(pushDebounceTimer);
      pushDebounceTimer = setTimeout(() => { pendingPush = false; queuePush(false); }, PUSH_DEBOUNCE_MS);
    }

    function queuePush(useKeepalive) {
      pushQueue = pushQueue.catch(()=>{}).then(() => doPushSnapshot(useKeepalive));
    }

    async function doPushSnapshot(useKeepalive) {
      if (!ls.get(TOKEN)) return;
      const snap = { ts: Date.now(), blob: makeSnapshot() };
      ls.set(SNAP_KEY, String(snap.ts));

      const json = JSON.stringify(snap);
      const size = new TextEncoder().encode(json).length;

      try {
        if (useKeepalive && size <= KEEPALIVE_LIMIT && navigator.sendBeacon) {
          const ok = navigator.sendBeacon(`${WP_BASE}/mvl/v1/storage`, json);
          if (ok) return;
        }
        await wp("/mvl/v1/storage", { method: "PUT", body: json, keepalive: useKeepalive && size <= KEEPALIVE_LIMIT });
      } catch (e) {
        if (e && (e.code === "jwt_auth_invalid_token" || e.status === 403)) logout(false);
      }
    }

    async function pullSnapshot() {
      if (!ls.get(TOKEN)) return;
      try {
        const res = await wp("/mvl/v1/storage", { timeout: 15000 });
        const serverTs = Number(res.ts ?? 0);
        const localTs  = Number(ls.get(SNAP_KEY) || 0);
        if (serverTs > localTs) {
          const blob = res.blob || {};
          ls.keys().filter(k => ![TOKEN,SNAP_KEY,USER_DISPLAY_NAME_KEY].includes(k)).forEach((k) => { if (!(k in blob)) ls.del(k); });
          for (const k in blob) ls.set(k, blob[k]);
          ls.set(SNAP_KEY, String(serverTs));

          ["bookmarks","chapterBookmarks","history"].forEach((k) => {
            window.dispatchEvent(new CustomEvent("localStorageSyncUpdate", { detail: { key: k, source: "pullSnapshot" } }));
          });
        }
      } catch (e) {
        if (e && (e.code === "jwt_auth_invalid_token" || e.status === 403)) logout(false);
      }
    }

    function updateLoginUI() {
      const logged = !!ls.get(TOKEN);
      document.querySelectorAll(".logged-in").forEach(el => el.style.display = logged ? "block" : "none");
      document.querySelectorAll(".logged-out").forEach(el => el.style.display = logged ? "none" : "block");
      const name = ls.get(USER_DISPLAY_NAME_KEY) || "";
      document.querySelectorAll(".username").forEach(el => el.textContent = logged ? name : "");
    }

    async function login(username, password) {
      const res = await wp("/jwt-auth/v1/token", { method: "POST", body: JSON.stringify({ username, password }) });
      ls.set(TOKEN, res.token);
      ls.set(USER_DISPLAY_NAME_KEY, res.user_display_name || res.user_nicename || res.user_email || "");
      await pullSnapshot();
      updateLoginUI();
      alert("Logged in!");
      location.reload();
    }

    async function signup(username, email, password) {
      await wp("/mvl/v1/register", { method: "POST", body: JSON.stringify({ username, email, password }) });
      await login(username, password);
    }

    function logout(reload=true) {
      clearTimeout(pushDebounceTimer);
      ls.clear();
      updateLoginUI();
      if (reload) location.reload();
    }

    window.mvlLogin = login;
    window.mvlSignup = signup;
    window.mvlLogout = logout;

    if (!window.__mvlStoragePatched) {
      window.__mvlStoragePatched = true;
      ["setItem","removeItem","clear"].forEach((name) => {
        const orig = Storage.prototype[name];
        if (!orig) return;
        Storage.prototype[name] = function (...args) {
          try { orig.apply(this, args); } catch {}
          const key = (name === "clear") ? "" : args[0];
          if (ls.get(TOKEN) && (name === "clear" || ![TOKEN,SNAP_KEY,USER_DISPLAY_NAME_KEY].includes(key))) schedulePush();
        };
      });
    }

    updateLoginUI();
    if (ls.get(TOKEN)) pullSnapshot();
    setInterval(() => { if (ls.get(TOKEN)) pullSnapshot(); }, PULL_INTERVAL_MS);
    window.addEventListener("pagehide", () => queuePush(true), { passive: true });

    document.querySelectorAll(".mvl-log-out").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        if (confirm("Are you sure you want to log out? This will clear all data stored on this device.")) logout();
      });
    });
  }

  // ---------------------------------------
  // Comentario (optimized: only process when visible + debounced observer)
  // ---------------------------------------
function initComentarioOptimized() {
  const MAX_VISIBLE_REPLIES = 0;
  const MAX_MESSAGE_LENGTH = 250;
  const MAX_VISIBLE_MAIN_COMMENTS = 5;

  const WAIT_MS = 30000;   // wait up to 30s for Commentario to mount
  const IO_MARGIN = "900px";

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  function findRoot() {
    // Common setups:
    // 1) <div class="comentario-comments">...</div>
    // 2) <comentario-comments>...</comentario-comments> (custom element)
    // 3) Sometimes Commentario wraps the class inside the custom element
    const a = document.querySelector(".comentario-comments");
    if (a) return a;

    const ce = document.querySelector("comentario-comments");
    if (ce) {
      const inner = ce.querySelector?.(".comentario-comments");
      return inner || ce;
    }
    return null;
  }

  function waitForRoot() {
    const existing = findRoot();
    if (existing) return Promise.resolve(existing);

    return new Promise((resolve) => {
      const start = Date.now();
      const mo = new MutationObserver(() => {
        const r = findRoot();
        if (r) { mo.disconnect(); resolve(r); }
        else if (Date.now() - start > WAIT_MS) { mo.disconnect(); resolve(null); }
      });
      mo.observe(document.documentElement, { childList: true, subtree: true });

      setTimeout(() => { mo.disconnect(); resolve(findRoot()); }, WAIT_MS);
    });
  }

  function whenNearViewport(el, fn) {
    if (!("IntersectionObserver" in window)) return fn();
    const io = new IntersectionObserver((ents) => {
      for (const ent of ents) {
        if (ent.isIntersecting) {
          io.disconnect();
          fn();
          break;
        }
      }
    }, { rootMargin: IO_MARGIN });
    io.observe(el);
  }

  function truncateCardBodyMessage(el) {
    if (!el || el.offsetParent === null || el.dataset.userExpanded === "true") return;

    let original = el.dataset.originalBodyHtml;
    if (!original) { original = el.innerHTML; el.dataset.originalBodyHtml = original; }

    el.querySelector(".read-more-message-btn")?.remove();

    const tmp = document.createElement("div");
    tmp.innerHTML = original;

    const ps = Array.from(tmp.querySelectorAll("p"));
    let plain = "";
    for (const p of ps) plain += (p.textContent || "").trim() + " ";
    plain = plain.trim();

    if (plain.length <= MAX_MESSAGE_LENGTH) {
      el.dataset.truncationFullyProcessed = "true";
      return;
    }

    let out = "";
    let used = 0;
    let truncated = false;

    for (let i = 0; i < ps.length; i++) {
      const p = ps[i];
      const pText = (p.textContent || "");
      const pHtml = p.outerHTML;

      if (used + pText.length + 3 > MAX_MESSAGE_LENGTH && i > 0) { truncated = true; break; }

      if (used + pText.length > MAX_MESSAGE_LENGTH && i === 0) {
        const cut = Math.max(0, MAX_MESSAGE_LENGTH - 3);
        const np = document.createElement("p");
        for (const a of p.attributes) np.setAttribute(a.name, a.value);
        np.textContent = pText.slice(0, cut).trimRight() + "...";
        out = np.outerHTML;
        truncated = true;
        break;
      }

      out += pHtml;
      used += pText.length + 1;
    }

    const wrap = document.createElement("div");
    wrap.innerHTML = out;
    const last = wrap.querySelector("p:last-of-type");
    if (last) last.innerHTML = (last.innerHTML || "").trimRight().replace(/\.\.\.\s*$/, "") + "...";
    out = wrap.innerHTML;

    el.innerHTML = out;
    el.dataset.isTruncated = "true";

    const btn = document.createElement("button");
    btn.textContent = "Read More";
    btn.className = "comentario-btn comentario-btn-sm comentario-btn-link read-more-message-btn";
    btn.style.cssText = "display:inline;padding:0 2px;margin-left:3px;border:none;background:none;vertical-align:baseline;color:var(--highlights)";

    const lastP = el.querySelector("p:last-of-type");
    if (lastP) {
      if (lastP.textContent.endsWith("...")) lastP.textContent = lastP.textContent.slice(0, -3).trimRight();
      lastP.appendChild(document.createTextNode(" "));
      lastP.appendChild(btn);
    } else {
      el.appendChild(btn);
    }

    btn.onclick = (ev) => {
      ev.stopPropagation();
      el.innerHTML = el.dataset.originalBodyHtml;
      el.dataset.isTruncated = "false";
      el.dataset.userExpanded = "true";

      const less = document.createElement("button");
      less.textContent = "Read Less";
      less.className = "comentario-btn comentario-btn-sm comentario-btn-link read-more-message-btn";
      less.style.cssText = "display:block;margin-top:5px;color:var(--highlights)";
      el.appendChild(less);

      less.onclick = (ev2) => {
        ev2.stopPropagation();
        el.dataset.userExpanded = "false";
        truncateCardBodyMessage(el);
      };
    };

    el.dataset.truncationFullyProcessed = "true";
  }

  function applyMainCommentVisibility(root) {
    const cards = Array.from(root.children).filter(x => x.classList?.contains("comentario-card"));
    let btn = document.querySelector(".view-all-main-comments-btn");

    if (root.dataset.allMainCommentsShown === "true") {
      btn?.remove();
      cards.forEach(c => c.style.display = "");
      return;
    }

    if (cards.length <= MAX_VISIBLE_MAIN_COMMENTS) {
      btn?.remove();
      cards.forEach(c => c.style.display = "");
      delete root.dataset.allMainCommentsShown;
      return;
    }

    let anchor = null;
    for (let i=0;i<cards.length;i++) {
      if (i < MAX_VISIBLE_MAIN_COMMENTS) { cards[i].style.display = ""; anchor = cards[i]; }
      else cards[i].style.display = "none";
    }

    if (!btn && anchor) {
      btn = document.createElement("button");
      btn.className = "comentario-btn comentario-btn-primary view-all-main-comments-btn";
      btn.style.cssText = "display:block;margin:15px auto;padding:8px 15px";
      btn.textContent = `View all ${cards.length} comments`;
      anchor.insertAdjacentElement("afterend", btn);

      btn.onclick = () => {
        cards.forEach(c => c.style.display = "");
        root.dataset.allMainCommentsShown = "true";
        btn.remove();
        processAll(root);
      };
    }
  }

  function applyShowMoreToReplies(root) {
    const topCards = root.matches(".comentario-comments")
      ? $$(".comentario-comments > .comentario-card", root.parentElement || document)
      : $$(".comentario-card", root); // safe fallback

    topCards.forEach((card) => {
      if (card.style.display === "none") return;

      const children = card.querySelector(":scope > .comentario-card-expand-body > .comentario-card-children");
      if (!children) return;

      const replies = Array.from(children.querySelectorAll(".comentario-card"));
      let btn = children.querySelector(":scope > .show-more-replies-btn");

      if (replies.length <= MAX_VISIBLE_REPLIES) {
        btn?.remove();
        delete card.dataset.showMoreRepliesProcessed;
        replies.forEach(r => r.style.display = "");
        return;
      }

      if (card.dataset.showMoreRepliesProcessed === "true" && btn) {
        if (btn.dataset.expanded === "false") btn.textContent = `Show More (${replies.length - MAX_VISIBLE_REPLIES} hidden)`;
        return;
      }

      for (let i=MAX_VISIBLE_REPLIES;i<replies.length;i++) replies[i].style.display = "none";

      if (!btn) {
        btn = document.createElement("button");
        btn.className = "comentario-btn comentario-btn-sm comentario-btn-link show-more-replies-btn";
        btn.style.cssText =
          "margin-top:8px;margin-bottom:8px;display:block;text-align:left;" +
          "padding-left:var(--comentario-card-expand-spacer-width, 24px);color:var(--highlights)";
        btn.dataset.expanded = "false";
        if (MAX_VISIBLE_REPLIES > 0 && replies[MAX_VISIBLE_REPLIES-1]) replies[MAX_VISIBLE_REPLIES-1].insertAdjacentElement("afterend", btn);
        else children.prepend(btn);
      }

      if (btn.dataset.expanded === "false") btn.textContent = `Show More (${replies.length - MAX_VISIBLE_REPLIES} hidden)`;

      btn.onclick = () => {
        const expanded = btn.dataset.expanded === "true";
        if (expanded) {
          for (let i=MAX_VISIBLE_REPLIES;i<replies.length;i++) replies[i].style.display = "none";
          const hidden = replies.length - MAX_VISIBLE_REPLIES;
          if (hidden > 0) { btn.textContent = `Show More (${hidden} hidden)`; btn.dataset.expanded = "false"; }
          else { btn.remove(); delete card.dataset.showMoreRepliesProcessed; }
        } else {
          replies.forEach(r => r.style.display = "");
          btn.textContent = "Show Less";
          btn.dataset.expanded = "true";
        }
      };

      card.dataset.showMoreRepliesProcessed = "true";
    });
  }

  function processAll(root) {
    applyMainCommentVisibility(root);

    // Truncate visible comment bodies
    $$(".comentario-card-self .comentario-card-body", root).forEach((b) => {
      if (b.offsetParent !== null) truncateCardBodyMessage(b);
    });

    applyShowMoreToReplies(root);
  }

  // ---- init (wait for mount, then attach observer) ----
  waitForRoot().then((root) => {
    if (!root) {
      console.warn("[Commentario] Root not found (timed out).");
      return;
    }
    if (root.__mvlCommentarioInit) return;
    root.__mvlCommentarioInit = true;

    whenNearViewport(root, () => {
      processAll(root);

      let timer = 0;
      const schedule = () => {
        clearTimeout(timer);
        timer = setTimeout(() => processAll(root), 300);
      };

      const mo = new MutationObserver((muts) => {
        for (const m of muts) {
          if (m.type === "childList" && (m.addedNodes.length || m.removedNodes.length)) { schedule(); break; }
          if (m.type === "characterData") { schedule(); break; }
        }
      });

      mo.observe(root, { childList: true, subtree: true, characterData: true });
    });
  });
}
})();
</script>
